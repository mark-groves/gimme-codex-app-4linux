name: upstream-watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: upstream-watch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  appcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Fetch current appcast metadata
        run: node scripts/check-upstream.mjs > upstream-current.json
      - name: Prepare prod update PR
        id: prepare
        run: >
          node scripts/prepare-upstream-update-pr.mjs
          --snapshot data/upstream.json
          --current upstream-current.json
          --body .cache/upstream-update-pr-body.md
          --channel prod
      - name: Validate prepared update
        if: steps.prepare.outputs.drift == 'true'
        run: make check
      - name: Create or update prod update PR
        if: steps.prepare.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: ${{ steps.prepare.outputs.branch }}
          PR_TITLE: ${{ steps.prepare.outputs.title }}
          PR_BODY_PATH: ${{ steps.prepare.outputs.body_path }}
          COMMIT_MESSAGE: ${{ steps.prepare.outputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -C "$PR_BRANCH"
          git add data/upstream.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to publish."
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          git fetch origin "refs/heads/$PR_BRANCH:refs/remotes/origin/$PR_BRANCH" || true
          git push --force-with-lease origin "HEAD:$PR_BRANCH"

          existing_pr="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --head "$PR_BRANCH" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$PR_TITLE" \
              --body "$(cat "$PR_BODY_PATH")"
            gh pr view "$existing_pr" --repo "$GITHUB_REPOSITORY" --json url --jq .url
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$PR_BRANCH" \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_PATH"
          fi
      - name: Upload current metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-current
          path: upstream-current.json
